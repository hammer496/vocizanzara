<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voci Zanzara 2024 - Archivio</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        h1 { color: #ef4444; font-size: 1.8em; margin: 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        .search-container { position: sticky; top: 0; background: #121212; padding: 15px 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #search { padding: 12px 20px; width: 85%; max-width: 400px; border-radius: 30px; border: 2px solid #333; background: #222; color: white; font-size: 1em; outline: none; transition: 0.3s; }
        #search:focus { border-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .btn { background: #1e1e1e; border: 1px solid #333; border-bottom: 4px solid #000; color: white; padding: 15px 8px; border-radius: 12px; cursor: pointer; transition: all 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 95px; }
        .btn:hover { background: #2a2a2a; border-color: #ef4444; }
        .btn:active { transform: translateY(3px); border-bottom-width: 1px; }
        .personaggio { font-size: 0.65em; text-transform: uppercase; color: #ef4444; font-weight: bold; margin-bottom: 6px; }
        .titolo { font-size: 0.85em; line-height: 1.2; font-weight: 500; }
        .playing { background: #ef4444 !important; border-color: #fff !important; }
    </style>
</head>
<body>

    <h1>VOCI ZANZARA 2024</h1>
    
    <div class="search-container">
        <input type="text" id="search" placeholder="Cerca frase o personaggio..." onkeyup="filter()">
    </div>

    <div class="grid" id="board"></div>

    <script>
        const audioFolder = "audio/";
        
        // LA STELE DI ROSETTA (Esempi mappati dai tuoi file reali)
        const sounds = [
            {p: "Demone Scimmia", t: "tutto è droga", f: "tutto_e_droga.mp3"},
            {p: "Pino Scotto", t: "contro Parenzo", f: "Pino_Scotto.mp3"},
            {p: "Alessio Lizzio", t: "ridata", f: "ahah.mp3"}, // Mappato su ahah.mp3 dalla tua lista
            {p: "vari", t: "erbone dance", f: "canzone_rap.mp3"},
            {p: "Mario Giordano", t: "ruspa ruspa ruspa", f: "verbo_ruspare.mp3"},
            {p: "Barisoni", t: "Barisoni gay", f: "Barisoni_gay.mp3"},
            {p: "Briatore", t: "tachipirina", f: "Briatore_tachipirina.mp3"},
            {p: "Richard Benson", t: "chi caccia i soldi", f: "cashcashcash.mp3"},
            {p: "Valentina Nappi", t: "loro non credono", f: "valentina_nappi_loro.mp3"},
            {p: "Mauro da Mantova", t: "Donazione", f: "Donazione_Mauro.mp3"},
            {p: "Parenzo", t: "Ciro", f: "ciro.mp3"},
            {p: "Cruciani", t: "Cruciani vs Mario", f: "Cruciani_vs_Mario.mp3"},
            {p: "Salvini", t: "Buongiorno Buonasera", f: "buongiornobuonasera.mp3"},
            {p: "Trump", t: "50 cent", f: "50cent_Trump.mp3"},
            {p: "Efe Bal", t: "mal di gola", f: "Ebbro.mp3"},
            {p: "Spatalino", t: "è novità", f: "Spatalino_novita.mp3"},
            {p: "Bugo Morgan", t: "Bugo e Morgan", f: "Bugo_Morgan.mp3"},
            {p: "Pappalardo", t: "Pappalardo vs Macron", f: "Pappalardo_vs_Macron.mp3"},
            {p: "Carisio", t: "casello di Carisio", f: "Carisio.mp3"}
            // Aggiungi qui gli altri file seguendo questo schema: 
            // {p: "Personaggio", t: "Titolo Tabella", f: "nome_file_reale.mp3"}
        ];

        let currentAudio = null;
        let currentBtn = null;

        function playSound(file, btn) {
            if (currentAudio) {
                currentAudio.pause();
                if (currentBtn) currentBtn.classList.remove('playing');
            }

            const url = audioFolder + file;
            currentAudio = new Audio(url);
            
            currentAudio.play().then(() => {
                btn.classList.add('playing');
                currentBtn = btn;
            }).catch(e => {
                console.error("Errore:", e);
                alert("Non trovo il file: " + file);
            });

            currentAudio.onended = () => btn.classList.remove('playing');
        }

        function render() {
            const board = document.getElementById('board');
            sounds.forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'btn';
                btn.dataset.tags = (s.p + " " + s.t).toLowerCase();
                btn.innerHTML = `<span class="personaggio">${s.p}</span><span class="titolo">${s.t}</span>`;
                btn.onclick = () => playSound(s.f, btn);
                board.appendChild(btn);
            });
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.btn').forEach(btn => {
                btn.style.display = btn.dataset.tags.includes(val) ? 'flex' : 'none';
            });
        }

        render();
    </script>
</body>
</html>
