<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voci Zanzara 2024</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        h1 { color: #ef4444; font-size: 1.8em; margin: 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        .search-container { position: sticky; top: 0; background: #121212; padding: 15px 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #search { padding: 12px 20px; width: 85%; max-width: 400px; border-radius: 30px; border: 2px solid #333; background: #222; color: white; font-size: 1em; outline: none; transition: 0.3s; }
        #search:focus { border-color: #ef4444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .btn { background: #1e1e1e; border: 1px solid #333; border-bottom: 4px solid #000; color: white; padding: 15px 8px; border-radius: 12px; cursor: pointer; transition: all 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90px; }
        .btn:active { transform: translateY(3px); border-bottom-width: 1px; }
        .personaggio { font-size: 0.65em; text-transform: uppercase; color: #ef4444; font-weight: bold; margin-bottom: 6px; }
        .titolo { font-size: 0.85em; line-height: 1.2; font-weight: 500; }
        .playing { background: #ef4444 !important; }
    </style>
</head>
<body>

    <h1>VOCI ZANZARA 2024</h1>
    
    <div class="search-container">
        <input type="text" id="search" placeholder="Cerca personaggio o frase..." onkeyup="filter()">
    </div>

    <div class="grid" id="board"></div>

    <script>
        const audioFolder = "audio/";
        
        // Esempio con i tuoi primi file
        const sounds = [
            { p: "Demone Scimmia", t: "tutto è droga" },
            { p: "Alessio Lizzio", t: "ridata" },
            { p: "Pino Scotto Parenzo", t: "contro Parenzo" },
            { p: "vari", t: "erbone dance" }
        ];

        let currentAudio = null;

        function playSound(title, btn) {
            if (currentAudio) currentAudio.pause();
            
            // TRUCCO: Trasformiamo "tutto è droga" in "tutto_e_droga.mp3"
            // Sostituiamo spazi, accentate e caratteri strani
            let fileName = title.toLowerCase()
                .replace(/ /g, "_")
                .replace(/è/g, "e")
                .replace(/é/g, "e")
                .replace(/ò/g, "o")
                .replace(/à/g, "a")
                .replace(/ù/g, "u")
                .replace(/ì/g, "i")
                .replace(/[^\w]/g, "_") // Rimuove punteggiatura residua
                .replace(/__+/g, "_")  // Toglie doppi underscore
                + ".mp3";

            const url = audioFolder + fileName;
            console.log("Provo a suonare:", url);

            currentAudio = new Audio(url);
            currentAudio.play().then(() => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
                btn.classList.add('playing');
            }).catch(e => {
                alert("Errore! Non trovo il file: " + fileName + "\nAssicurati che sia nella cartella audio.");
            });
            
            currentAudio.onended = () => btn.classList.remove('playing');
        }

        function render() {
            const board = document.getElementById('board');
            sounds.forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'btn';
                btn.dataset.tags = (s.p + " " + s.t).toLowerCase();
                btn.innerHTML = `<span class="personaggio">${s.p}</span><span class="titolo">${s.t}</span>`;
                btn.onclick = () => playSound(s.t, btn);
                board.appendChild(btn);
            });
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.btn').forEach(btn => {
                btn.style.display = btn.dataset.tags.includes(val) ? 'flex' : 'none';
            });
        }

        render();
    </script>
</body>
</html>
