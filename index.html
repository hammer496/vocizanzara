<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>voci da La Zanzara</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; padding: 20px; padding-bottom: 160px; margin: 0; }
        h1 { text-align: center; color: #ff4757; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Contenitore Scacchiera */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 15px; 
            max-width: 1100px; 
            margin: 30px auto; 
        }
        
        /* Singola Casella */
        .audio-card { 
            background: #2f3542; 
            border-radius: 12px; 
            padding: 20px; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s ease;
            border-bottom: 5px solid #ff4757;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100px;
        }
        
        .audio-card:hover { 
            transform: scale(1.03); 
            background: #3e4452; 
            border-bottom-color: #ffa502; 
        }
        
        /* Testo dentro le caselle */
        .tag { 
            font-size: 11px; 
            color: #ff6b81; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .titolo { 
            font-size: 15px; 
            font-weight: 600; 
            line-height: 1.2;
        }

        /* Player Fisso in basso */
        #player-fixed { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: #1e1e1e; 
            padding: 20px; 
            text-align: center; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.7); 
            z-index: 1000;
        }
        
        #track-display { 
            color: #ffa502; 
            margin-bottom: 10px; 
            font-weight: bold; 
            font-size: 16px; 
        }
        
        audio { width: 90%; max-width: 700px; }
    </style>
</head>
<body>

    <h1>voci da La Zanzara</h1>

    <div class="grid-container" id="audioGrid">
        </div>

    <div id="player-fixed">
        <div id="track-display">Scegli una perla...</div>
        <audio id="mainPlayer" controls></audio>
    </div>

    <script>
        // Indirizzo base dei tuoi file su GitHub
        const BASE_URL = "https://hammer496.github.io/vocizanzara/audio/";

        // DATABASE ESEMPIO (Primi 20 file incrociati)
        // t = TAG (Personaggio), n = NOME (Titolo), f = FILE (Nome mp3)
        const audioList = [
            { t: "Demone Scimmia", n: "tutto è droga", f: "tutto_e_droga.mp3" },
            { t: "Vari", n: "ridata", f: "ridata.mp3" },
            { t: "Pino Scotto", n: "Pino Scotto", f: "Pino_Scotto.mp3" },
            { t: "Musica", n: "erbone dance", f: "erbone_dance.mp3" },
            { t: "Vari", n: "pazzo per gesù", f: "pazzo_per_gesu.mp3" },
            { t: "Donato da Varese", n: "naturalmente", f: "naturalmente.mp3" },
            { t: "Donato da Varese", n: "messicanone", f: "messicanone.mp3" },
            { t: "Donato da Varese", n: "mercanteggia", f: "mercanteggia.mp3" },
            { t: "Vari", n: "illegally", f: "illegally.mp3" },
            { t: "Vari", n: "dedica David", f: "dedica_David.mp3" },
            { t: "Vari", n: "ho strappato l'INPS", f: "ho_strappato_l_INPS.mp3" },
            { t: "Vari", n: "truffatori INPS", f: "truffatori_INPS.mp3" },
            { t: "Semproni", n: "semproni", f: "semproni.mp3" },
            { t: "Pappalardo", n: "Pappalardo vs Macron", f: "Pappalardo_vs_Macron.mp3" },
            { t: "Salvini", n: "ruspa ruspa ruspa", f: "ruspa_ruspa_ruspa.mp3" },
            { t: "Vari", n: "e sti cazzi", f: "e_sti_cazzi.mp3" },
            { t: "Ciro", n: "ciro", f: "ciro.mp3" },
            { t: "Cruciani", n: "cruciani ricchione", f: "cruciani_ricchione.mp3" },
            { t: "Vari", n: "signora vs sindaco", f: "signora_vs_sindaco.mp3" },
            { t: "Salvini", n: "ruspa e taser", f: "ruspa_e_taser.mp3" }
        ];

        function caricaGriglia() {
            const grid = document.getElementById('audioGrid');
            let html = '';
            
            audioList.forEach(item => {
                html += `
                    <div class="audio-card" onclick="riproduci('${item.f}', '${item.n}')">
                        <div class="tag">${item.t}</div>
                        <div class="titolo">${item.n}</div>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }

        function riproduci(file, nome) {
            const player = document.getElementById('mainPlayer');
            const display = document.getElementById('track-display');
            
            // Costruisce l'URL completo e avvia l'audio
            player.src = BASE_URL + encodeURIComponent(file);
            display.innerText = "🔊 " + nome;
            player.play();
        }

        // Avvia la creazione della pagina
        caricaGriglia();
    </script>
</body>
</html>
