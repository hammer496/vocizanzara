    <title>voci da La Zanzara</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; padding: 20px; padding-bottom: 160px; margin: 0; }
        h1 { text-align: center; color: #ff4757; }
        .search-container { max-width: 600px; margin: 20px auto; text-align: center; }
        #searchInput { width: 100%; padding: 12px; border-radius: 20px; border: none; font-size: 16px; background: #2f3542; color: white; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; max-width: 1200px; margin: auto; }
        .audio-card { background: #2f3542; border-radius: 8px; padding: 15px; text-align: center; cursor: pointer; border-bottom: 3px solid #ff4757; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .audio-card:hover { background: #3e4452; }
        .hidden { display: none !important; }
        #player-fixed { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e1e1e; padding: 15px; text-align: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        audio { width: 90%; max-width: 500px; }
        #track-display { color: #ffa502; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
    </style>
</head>

        function render() {
            const container = document.getElementById('audioGrid');
            let html = '';
            // Ordina dalla A alla Z
            audioList.sort((a, b) => a.n.localeCompare(b.n));
            
            for (let i = 0; i < audioList.length; i++) {
                html += '<div class="audio-card" onclick="playAudio(\'' + audioList[i].f + '\', \'' + audioList[i].n + '\')">' + audioList[i].n + '</div>';
            }
            container.innerHTML = html;
        }

        function playAudio(file, nome) {
            const p = document.getElementById('mainPlayer');
            const d = document.getElementById('track-display');
            p.src = GITHUB_URL + encodeURIComponent(file);
            d.innerText = "🔊 " + nome;
            p.play();
        }

        function filterAudio() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.getElementsByClassName('audio-card');
            for (let i = 0; i < cards.length; i++) {
                const txt = cards[i].innerText.toLowerCase();
                if (txt.indexOf(val) > -1) {
                    cards[i].classList.remove('hidden');
                } else {
                    cards[i].classList.add('hidden');
                }
            }
        }

        // Avvio manuale senza attendere troppo
        render();
    </script>
