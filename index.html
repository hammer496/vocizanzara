<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voci Zanzara 2024</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; padding-bottom: 100px; }
        h1 { color: #ef4444; font-size: 1.8em; margin: 20px 0; text-transform: uppercase; }
        
        .search-container { position: sticky; top: 0; background: #121212; padding: 15px 0; z-index: 100; }
        #search { padding: 12px 20px; width: 85%; max-width: 400px; border-radius: 30px; border: 2px solid #333; background: #222; color: white; outline: none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 15px; }
        .btn { background: #1e1e1e; border: 1px solid #333; border-bottom: 4px solid #000; color: white; padding: 10px; border-radius: 12px; cursor: pointer; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.1s; }
        .btn:active { transform: translateY(2px); border-bottom-width: 1px; }
        .btn.playing { border-color: #ef4444; background: #2a2a2a; }
        
        .personaggio { font-size: 0.6em; text-transform: uppercase; color: #ef4444; font-weight: bold; }
        .titolo { font-size: 0.8em; line-height: 1.2; margin-top: 5px; }

        /* PLAYER FISSO IN BASSO */
        .player-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #1e1e1e;
            border-top: 2px solid #ef4444;
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }
        audio {
            width: 90%;
            max-width: 600px;
            height: 40px;
        }
        #current-track {
            font-size: 0.8em;
            margin-bottom: 8px;
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>VOCI ZANZARA 2024</h1>
    
    <div class="search-container">
        <input type="text" id="search" placeholder="Cerca frase o personaggio..." onkeyup="filter()">
    </div>

    <div class="grid" id="board"></div>

    <div class="player-container">
        <div id="current-track">Seleziona una
