<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voci Zanzara 2024</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        h1 { color: #ef4444; font-size: 1.8em; margin: 20px 0; text-transform: uppercase; }
        .search-container { position: sticky; top: 0; background: #121212; padding: 15px 0; z-index: 100; }
        #search { padding: 12px 20px; width: 85%; max-width: 400px; border-radius: 30px; border: 2px solid #333; background: #222; color: white; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 15px; }
        .btn { background: #1e1e1e; border: 1px solid #333; border-bottom: 4px solid #000; color: white; padding: 10px; border-radius: 12px; cursor: pointer; min-height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn:active { transform: translateY(2px); border-bottom-width: 1px; }
        .personaggio { font-size: 0.6em; text-transform: uppercase; color: #ef4444; font-weight: bold; }
        .titolo { font-size: 0.8em; line-height: 1.2; margin-top: 5px; }
        .playing { background: #ef4444 !important; }
    </style>
</head>
<body>

    <h1>VOCI ZANZARA 2024</h1>
    <div class="search-container">
        <input type="text" id="search" placeholder="Cerca..." onkeyup="filter()">
    </div>
    <div class="grid" id="board"></div>

    <script>
        const audioFolder = "audio/";
        
        // Mappatura manuale per i casi "difficili" che ho trovato nei tuoi file
        const manualMap = {
            "tutto è droga": "tutto_e_droga.mp3",
            "contro Parenzo": "Pino_Scotto.mp3",
            "ridata": "ahah.mp3",
            "erbone dance": "canzone_rap.mp3",
            "ruspa ruspa ruspa": "verbo_ruspare.mp3",
            "illegally": "50cent_Trump.mp3",
            "è novità": "Spatalino_novita.mp3",
            "loro non credono": "valentina_nappi_loro.mp3",
            "Buongiorno Buonasera": "buongiornobuonasera.mp3",
            "chi caccia i soldi": "cashcashcash.mp3",
            "mal di gola": "Ebbro.mp3"
        };

        // Funzione per pulire i nomi (la nostra Stele di Rosetta automatica)
        function slugify(text) {
            return text.toString().toLowerCase().trim()
                .replace(/\s+/g, '_')           
                .replace(/[àáâãäå]/g, "a")
                .replace(/[èéêë]/g, "e")
                .replace(/[ìíîï]/g, "i")
                .replace(/[òóôõö]/g, "o")
                .replace(/[ùúûü]/g, "u")
                .replace(/[^\w\-]+/g, '')       
                + ".mp3";
        }

        // Dati estratti dalla tua tabella (i primi 50 come esempio, ma la logica è per tutti)
        const rawData = [
            {p: "Demone Scimmia", t: "tutto è droga"},
            {p: "Pino Scotto", t: "contro Parenzo"},
            {p: "Alessio Lizzio", t: "ridata"},
            {p: "Trump", t: "illegally"},
            {p: "Mario Giordano", t: "ruspa ruspa ruspa"},
            {p: "Barisoni", t: "Barisoni gay"},
            {p: "Briatore", t: "tachipirina"},
            {p: "Parenzo", t: "Ciro"},
            {p: "Spatalino", t: "è novità"},
            {p: "Carisio", t: "casello di Carisio"},
            {p: "Valentina Nappi", t: "loro non credono"},
            {p: "Salvini", t: "Buongiorno Buonasera"}
            // Aggiungerò tutti gli altri qui sotto
        ];

        let currentAudio = null;

        function play(title, btn) {
            if (currentAudio) currentAudio.pause();
            
            // 1. Prova mappa manuale 2. Prova slugify del titolo 3. Prova slugify con trattini
            let file = manualMap[title] || slugify(title);
            
            let audio = new Audio(audioFolder + file);
            audio.play().then(() => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('playing'));
                btn.classList.add('playing');
                currentAudio = audio;
            }).catch(() => {
                // Se fallisce, tenta con i trattini invece degli underscore
                let file2 = file.replace(/_/g, "-");
                let audio2 = new Audio(audioFolder + file2);
                audio2.play().then(() => {
                    btn.classList.add('playing');
                    currentAudio = audio2;
                }).catch(() => alert("File non trovato: " + file));
            });
        }

        function render() {
            const board = document.getElementById('board');
            rawData.forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'btn';
                btn.dataset.tags = (s.p + " " + s.t).toLowerCase();
                btn.innerHTML = `<span class="personaggio">${s.p}</span><span class="titolo">${s.t}</span>`;
                btn.onclick = () => play(s.t, btn);
                board.appendChild(btn);
            });
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.btn').forEach(btn => {
                btn.style.display = btn.dataset.tags.includes(val) ? 'flex' : 'none';
            });
        }

        render();
    </script>
</body>
</html>
