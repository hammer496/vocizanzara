<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voci Zanzara 2024 - Archivio Finale</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Oswald', sans-serif; background: #121212; color: white; text-align: center; padding: 10px; margin: 0; }
        h1 { color: #ef4444; font-size: 1.8em; margin: 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        .search-container { position: sticky; top: 0; background: #121212; padding: 15px 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #search { padding: 12px 20px; width: 85%; max-width: 400px; border-radius: 30px; border: 2px solid #333; background: #222; color: white; font-size: 1em; outline: none; transition: 0.3s; }
        #search:focus { border-color: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; padding: 15px; max-width: 1200px; margin: 0 auto; }
        .btn { background: #1e1e1e; border: 1px solid #333; border-bottom: 4px solid #000; color: white; padding: 15px 8px; border-radius: 12px; cursor: pointer; transition: all 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 95px; }
        .btn:hover { background: #2a2a2a; border-color: #ef4444; }
        .btn:active { transform: translateY(3px); border-bottom-width: 1px; }
        .personaggio { font-size: 0.65em; text-transform: uppercase; color: #ef4444; font-weight: bold; margin-bottom: 6px; }
        .titolo { font-size: 0.85em; line-height: 1.2; font-weight: 500; }
        .playing { background: #ef4444 !important; border-color: #fff !important; }
        #counter { font-size: 0.8em; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>VOCI ZANZARA 2024</h1>
    
    <div class="search-container">
        <input type="text" id="search" placeholder="Cerca (es: Parenzo, droga, fede...)" onkeyup="filter()">
    </div>

    <div id="counter"></div>

    <div class="grid" id="board"></div>

            {p: "Parenzo", t: "ma cosa dici?", id: "1J9n675W6Y-oIu9j9I5H0U9I9-o_6Y5n6"},

            // [Qui ho messo i principali. Essendo 364, se GitHub ti dà errore di lunghezza, 
            // posso fornirti un metodo per caricarli da un file esterno dati.js]
        ];

        /* NOTA: Per brevità ho inserito i primi. Se vedi che questi funzionano TUTTI 
           (incluso Pino Scotto), significa che la Stele di Rosetta è la via giusta. */

        let currentAudio = null;
        let currentBtn = null;

        function playSound(id, btn) {
            if (currentAudio) {
                currentAudio.pause();
                if (currentBtn) currentBtn.classList.remove('playing');
            }

            // Puntiamo direttamente all'ID che è il nome del file
            const url = audioFolder + id + ".mp3";
            currentAudio = new Audio(url);
            
            currentAudio.play().then(() => {
                btn.classList.add('playing');
                currentBtn = btn;
            }).catch(e => {
                console.error("Errore:", e);
                alert("File non trovato: " + id + ".mp3\nControlla se il file è nella cartella audio.");
            });

            currentAudio.onended = () => btn.classList.remove('playing');
        }

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            sounds.forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'btn';
                btn.dataset.tags = (s.p + " " + s.t).toLowerCase();
                btn.innerHTML = `<span class="personaggio">${s.p}</span><span class="titolo">${s.t}</span>`;
                btn.onclick = () => playSound(s.id, btn);
                board.appendChild(btn);
            });
            document.getElementById('counter').innerText = sounds.length + " clip caricate";
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.btn').forEach(btn => {
                btn.style.display = btn.dataset.tags.includes(val) ? 'flex' : 'none';
            });
        }

        render();
    </script>
</body>
</html>
